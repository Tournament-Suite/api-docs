openapi: 3.0.3
info:
  title: Tournament Suite API
  version: 2.0.0
  description: >
    Official OpenAPI 3.0 specification for Tournament Suite API v2.0.0. The full
    machine-readable spec is exported from the live API on every deploy. Base URL:
    https://api.tournamentsuite.com/api/v1
servers:
  - url: https://api.tournamentsuite.com/api/v1
    description: Production
paths: {}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - bearerAuth: []
  - apiKey: []